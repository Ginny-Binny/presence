server {
    listen 80;
    listen [::]:80;
    server_name status.psyduck.in;

    # Wakapi behind a path prefix so VS Code's WakaTime extension can push to it.
    # Trailing slash on both sides strips the /wakapi/ prefix before forwarding.
    location /wakapi/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;

        # Belt-and-braces: card-server already sets this, but reapply at the
        # edge so GitHub's camo CDN re-fetches every 30s even if the upstream
        # forgets.
        add_header Cache-Control "public, max-age=30" always;
    }
}
