env: production

server:
  port: 3001
  listen_ipv4: 127.0.0.1
  listen_ipv6: ''
  base_path: /
  public_url: https://status.psyduck.in/wakapi

app:
  cleanup: true
  inactive_threshold_days: 365
  import_enabled: false
  custom_languages: {}

security:
  password_salt: CHANGE_ME_TO_A_RANDOM_STRING
  insecure_cookies: false
  cookie_max_age: 172800
  allow_signup: true
  expose_metrics: false

db:
  dialect: sqlite3
  path: /var/lib/wakapi/wakapi.db
  max_conn: 10
